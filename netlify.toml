# Netlify config — site statique Impactacom

[build]
  publish = "."

# SPA fallback : toute route inconnue sert index.html
# (essentiel pour que /programmes, /contact etc. fonctionnent au refresh direct)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Headers de sécurité basiques
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
